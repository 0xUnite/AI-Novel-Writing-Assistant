                              - generic [ref=e9961]:
                                - generic [ref=e9962]: 2. 半斤生死
                                - generic [ref=e9963]: 让周衍亲眼见证'少交半斤药泥'的真实代价，使死亡不再是背景设定而是一个正在发生的具象化事件，把他对自己处境的认知从'危险'推至'濒死线'。 | 一个与周衍同棚的药童因晒药时被雨水冲走半斤药泥，被监工当场拖走；周衍看着那人被绑着腿拖向矿沟方向，听见的是惨叫还是哀求已经不重要了——重要的是那个人的今天就是他的明天。 | 药谷的规矩不是契约，是称斤论两的生死簿：半斤药材等于一条人命，亏空没有宽限期，申诉通道为零。 | 惊。周衍握着手里那把勉强凑够数的药泥，指节发白——不是因为悲伤，而是因为他在飞快地算：自己还差多少，监工上次看他的眼神是什么意思，以及那个被拖走的人昨晚有没有把藏药的位置告诉他。算计在恐惧之前启动，这是活下来的本能。
