                              - paragraph [ref=e9904]: “季寒庐。”
                              - paragraph [ref=e9905]: 这个名字让周衍的眉头微微皱了皱。
                              - paragraph [ref=e9906]: 季寒庐是药谷最大的矿主，手下有十几条矿路，控制着药谷三成以上的灵石产出。据说此人手段狠辣，连宗门里的长老都要给他几分面子。
                              - paragraph [ref=e9907]: “他是矿路的头头，你觉得他会收一个药童私采的赃物？”周衍问。
                              - paragraph [ref=e9908]: “他会。”那人往前走了两步，声音压得更低，“因为那条淤沟，本来就是他让人故意留的饵。”
                              - paragraph [ref=e9909]: 周衍的眼神变了。
                              - paragraph [ref=e9910]: 那人看着他，嘴角的笑意更深了：“你以为孙大壮真的是自己找到那条路的？那条淤沟半年前就被人盯上了，专门用来钓药童里的愣头青。孙大壮是我的人，但他不知道我在用他——他以为自己是在发财，其实是在替季寒庐的矿路挖淤泥。”
                              - paragraph [ref=e9911]: “你告诉我这些，想干什么？”
                              - paragraph [ref=e9912]: “想让你知道，”那人指了指他腰间的布袋，“你手里那块东西，根本不是你自己挖到的。是季寒庐矿路下面埋的赃物。孙大壮他们被抓走了，你侥幸逃脱，但那东西落在你手里——你说，季寒庐会怎么想？”
                              - paragraph [ref=e9913]: 周衍的脑子飞快地转着。
                              - paragraph [ref=e9914]: 这是一条死路。
                              - paragraph [ref=e9915]: 那块玄铁不管他怎么处置，都会惹来麻烦。留着，季寒庐早晚会找上门；卖了，功德堂不敢收，私下找不到买家；扔了，那等于白忙活一场。
                              - paragraph [ref=e9916]: “你到底想说什么？”他盯着那人的眼睛。
                              - paragraph [ref=e9917]: 那人笑了笑，从袖子里又掏出一样东西，朝他扔了过来。
                              - paragraph [ref=e9918]: 周衍接住一看——是一枚铜钱，和普通铜钱没什么两样，但钱孔里穿着一根细细的红绳。
                              - paragraph [ref=e9919]: “这是什么？”
                              - paragraph [ref=e9920]: “这是季寒庐矿路的入场帖。”那人说，“明天卯时，拿着这个去北边的矿口，有人会接应你。你把那东西交给季寒庐，他会给你一个满意的价钱。”
                              - paragraph [ref=e9921]: “我凭什么信你？”
                              - paragraph [ref=e9922]: “凭你没得选。”那人直起身，往土墙外走去，“孙大壮他们的事，明天一早就会传遍整个药谷。到时候所有人都会知道，有四个不知死活的小子私闯矿路，被执事抓了现行。你觉得，你还能在这药谷里待下去吗？”
                              - paragraph [ref=e9923]: 周衍没说话。
                              - paragraph [ref=e9924]: 那人走出几步，又回过头来：“对了，忘了自我介绍。我叫方浊，季寒庐手下的一个小跑腿。以后有什么发财的路子，可以来找我。”
                              - paragraph [ref=e9925]: 说完，他翻过土墙，消失在夜色里。
                              - paragraph [ref=e9926]: 周衍站在原地，低头看着手里的铜钱和布袋里的铁盒子。
                              - paragraph [ref=e9927]: 月光把他的影子拉得很长，像是一根细细的枯枝，孤零零地戳在荒地上。
                              - paragraph [ref=e9928]: 三天。
                              - paragraph [ref=e9929]: 他必须在三天之内凑够一百文，给阿禾换一份洗练灵枢的药散。否则，她撑不过这个月。
                              - paragraph [ref=e9930]: 而现在，他手里有两条路——
                              - paragraph [ref=e9931]: 一条是方浊给的：把玄铁交给季寒庐，换一笔钱，然后彻底绑上矿路的贼船。
                              - paragraph [ref=e9932]: 另一条是他自己的：把玄铁藏起来，继续在药谷里熬，用最笨的办法一点一点凑药资。
                              - paragraph [ref=e9933]: 但第一条路，季寒庐是什么人，整个药谷没人不知道。和他打交道，无异于与虎谋皮。
                              - paragraph [ref=e9934]: 第二条路，能来得及吗？
                              - paragraph [ref=e9935]: 周衍攥紧手里的铜钱，抬起头，看向药谷东边那片低矮的棚屋区。阿禾还在那里躺着，烧得人事不省，等着他拿药回去。
                              - paragraph [ref=e9936]: 他没有退路。
                              - paragraph [ref=e9937]: 夜风吹过荒地，卷起一阵淤泥的腥臭味。周衍把铜钱塞进怀里，把铁盒子藏进布袋最深处，转身朝棚屋区走去。
                              - paragraph [ref=e9938]: 三天。
                              - paragraph [ref=e9939]: 他只有三天。
