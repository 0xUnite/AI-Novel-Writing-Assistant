                                - generic [ref=e9966]: 把'三日内凑资源救妹妹'的两条硬任务线同时钉死在周衍头上，使章节末尾形成不可绕过的倒计时压迫，并让读者相信此人若不在三天内拼死翻盘，下一章就得亲眼看着周阿禾断气。 | 周衍回到破屋时，周阿禾的脉象比昨日又弱了一分；药铺传来的消息是：洗练灵枢的药资还差三成，而手里这批能换钱的脏活引来了另一双觊觎的眼睛——他必须在资源争夺与时间赛跑之间同时作战。 | 周阿禾的命和周衍的命是绑在一起的：她死了，周衍在药谷就没有软肋但也没有了唯一的根；他死了，她连三天都撑不到。三日之后，要么两人一起活，要么一起死，没有中间选项。 | 焦灼。破屋里的药炉冷了半截，周阿禾烧得糊涂却在喊哥哥；周衍坐在门槛上，手里攥着那批脏活的凭证，脑子里飞速转动——三日，他必须在这三天里完成正常药童一个月的积累，而药谷里不止他一个饿红了眼的人在盯着同样的机会。星相仪的碎片在他怀里隐隐发热，像是在等一个合适的时机破壳。
