                            - generic [ref=e9731]: 药童不值钱
                            - paragraph [ref=e9732]: 让周衍在药谷最底层的尸坑与药渣之间完成生存压迫的落地，同时把'三日内凑资源'与'妹妹等药'两条硬任务钉死在他头上，使读者相信此人若不拼死翻盘，下一章就得看着亲人断气。
                        - generic [ref=e9733]:
                          - generic [ref=e9734]:
                            - generic [ref=e9735]:
                              - generic [ref=e9736]: 已保存正文
                              - generic [ref=e9737]: 这里默认展示当前章节最新的可读正文，避免主写作区被次级资产挤占。
                            - generic [ref=e9739]: 字数 6921
                          - article [ref=e9741]:
                            - generic [ref=e9742]:
                              - paragraph [ref=e9743]: 灰蒙蒙的天压在药谷上方，像一块永远晒不干的破布。
                              - paragraph [ref=e9744]: 周衍蹲在尸坑边沿，指尖捏住一块沾满尸水的布片，抖了抖，让上面的残药顺着布纹滴进手边的竹篓里。动作不快不慢，尸水的寒气顺着布片渗进指骨，他连眉头都没皱一下。
                              - paragraph [ref=e9745]: 这种事不需要皱眉头。皱多了，脸皮会松。
                              - paragraph [ref=e9746]: 坑里还有七八个药童，有的在翻找布片，有的干脆把整块烂布往嘴里塞，嚼出浑浊的汁液往下咽。周衍看了一眼，移开目光，继续手上的活。
                              - paragraph [ref=e9747]: 布片上的药渣叫“净身泥”，是药谷炼丹房流出来的废料。这东西在修士眼里连泔水都不如，但在药童嘴里，是能往身体里填几两灵气的玩意儿。
                              - paragraph [ref=e9748]: 当然，也可以换钱。
                              - paragraph [ref=e9749]: 功德碑就在尸坑上方十丈处，青石碑面刻着密密麻麻的小字，是药谷的规矩。周衍不用抬头也知道上面写了什么——三日一交，一人一斤，缺半两者，罚；缺一斤者，填。
                              - paragraph [ref=e9750]: 填什么，没人明说。但坑底那些腐烂程度不一的尸体，已经替石碑把话说完了。
                              - paragraph [ref=e9751]: “周衍！”
                              - paragraph [ref=e9752]: 一个尖利的声音从背后传来。周衍手上的动作没停，只是把竹篓往身前挪了半寸，挡住了里面刚攒下的一点药泥。
                              - paragraph [ref=e9753]: 来的是执事手下的狗腿子，一个干瘦的年轻人，脸上带着一种长期吃不饱、靠捡别人剩菜爬上来的精明相。
                              - paragraph [ref=e9754]: “今日的份儿，够了吗？”他扫了一眼周衍的竹篓，又看了看坑里还在翻找的其他人，嘴角抽了抽。
                              - paragraph [ref=e9755]: “差三两。”周衍把竹篓往前递了递，让他看清楚里面的东西，“还得再翻两坑。”
                              - paragraph [ref=e9756]: 干瘦的年轻人哼了一声，蹲下来，伸手在竹篓里搅了搅，掏出一块拇指大的干药渣，丢进自己袖子里。周衍看见了，没说话。
                              - paragraph [ref=e9757]: 这种事没必要说话。说了，明天这块药渣就会变成他的。
                              - paragraph [ref=e9758]: “快点。”干瘦的年轻人站起身，拍了拍手上的泥，“暮晚之前交不上来，你知道后果。”
                              - paragraph [ref=e9759]: 说完，他踢了一脚坑边一个还在磨蹭的药童，那孩子一个踉跄滚进了尸水里，爬起来时满脸污秽，却连哭都不敢哭一声。
                              - paragraph [ref=e9760]: 周衍收回目光，继续翻找布片。
                              - paragraph [ref=e9761]: 他不认识那个孩子。药谷的药童来来去去，能活过三个月的都是运气，活不过的，连名字都不会被人记住。功德碑上那一行“填”字，就是他们最后的归宿。
                              - paragraph [ref=e9762]: 日头渐渐偏西，尸坑里的气味越来越重。周衍把最后一篓药泥倒进自己攒的布袋里，拎了拎，估算重量。
                              - paragraph [ref=e9763]: 七两。
                              - paragraph [ref=e9764]: 还差三两。
                              - paragraph [ref=e9765]: 他站起身，膝盖骨发出一声轻响，在尸坑边蹲了太久，血液回流带来的麻痒让他顿了顿才站稳。环顾四周，坑里的人已经散得差不多了，剩下的三两个还在埋头翻找，动作越来越急躁。
                              - paragraph [ref=e9766]: 暮晚之前。
                              - paragraph [ref=e9767]: 周衍拎着布袋往药泥收购点走，路过功德碑时，脚步微微一顿。
                              - paragraph [ref=e9768]: 石碑最下方刻着一行小字，是今年新加的：“季家矿路开，招募清淤工，日结三十文，多劳多得。”
                              - paragraph [ref=e9769]: 三十文。
                              - paragraph [ref=e9770]: 周衍在心里算了一笔账。三文钱能换一斤最次的粗粮，够他和阿禾吃两天。但清淤工是重活，吃得多才能干得多，而他今天已经在这坑边蹲了六个时辰，肚子里那点野菜汤早就不知道消化到哪里去了。
