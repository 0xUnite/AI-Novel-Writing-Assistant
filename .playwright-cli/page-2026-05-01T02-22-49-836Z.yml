                        - text: 短故事，4到5万字，女主第一人称。苏清月是现代连锁超市女老板，穿到八零年代驻岛随军家属院，成了人人嫌弃的作精恶毒后妈。原主偷走给烈士遗孤龙凤胎买救命药的钱，要倒贴小白脸周文斌；休假归来的冷面军官贺峥撞见，拍下离婚报告要她滚。穿越后的苏清月冷静签字，只要求一个月把两个孩子治好。她有随身空间：现代独栋大超市、米面粮油、药品和微型灵泉。她不纠缠、不内耗，把贺峥当合作对象，救孩子、打极品、做生意、去南方特区。贺峥从厌恶、震惊、单向沦陷到追妻火葬场。结局苏清月事业成势，与彻底改变后的贺峥建立平等关系。
